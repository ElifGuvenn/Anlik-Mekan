services:
  - type: web
    name: anlik-mekan
    runtime: docker
    plan: free
    healthCheckPath: /
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: anlik-mekan-db
          property: connectionString
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      # Cloudinary - Render dashboard'dan elle doldur
      - key: Cloudinary__CloudName
        sync: false
      - key: Cloudinary__ApiKey
        sync: false
      - key: Cloudinary__ApiSecret
        sync: false
      # E-posta - Render dashboard'dan elle doldur
      - key: Email__Host
        value: smtp.gmail.com
      - key: Email__Port
        value: "587"
      - key: Email__User
        sync: false
      - key: Email__Password
        sync: false
      - key: Email__From
        value: noreply@anlikmekan.com

databases:
  - name: anlik-mekan-db
    plan: free
    databaseName: anlikmekan
    user: anlikmekan
